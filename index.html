    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        .climate-crisis-muxday { 
            font-family: "Climate Crisis", sans-serif; 
            font-optical-sizing: auto; 
            font-weight: 400; 
            font-style: normal; 
            font-variation-settings: "YEAR" 1979; 
        }

        :root {
            --accent-teal: #8be8cb;
            --accent-blue: #7ea2aa;
            --accent-gray: #888da7;
            --accent-purple: #9c7a97;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', system_ui, sans-serif;
            cursor: url('https://huanmux.github.io/assets/image/diamond-cursor.cur'), auto;
        }

        /* Dot Matrix Background */
        .dot-matrix {
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(139, 232, 203, 0.08) 1px, transparent 0),
                radial-gradient(circle at 22px 22px, rgba(126, 162, 170, 0.06) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* Plasma Background Animation */
        .plasma-bg {
            background: linear-gradient(45deg, #303633, #1f2421, #303633);
            background-size: 400% 400%;
            animation: plasma 25s ease infinite;
        }

        @keyframes plasma {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Micro Texture Overlay */
        .texture {
            position: relative;
        }
        .texture::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.7%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%22 height=%22100%22 filter=%22url(%23n)%22 opacity=%220.04%22/%3E%3C/svg%27') repeat;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        /* Shimmer Effect */
        .shimmer-card {
            position: relative;
            overflow: hidden;
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .shimmer-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 300%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.25),
                transparent
            );
            transform: skewX(-25deg);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(400%) skewX(-25deg); }
        }

        /* Superior Hover & Click Effects */
        .brand-card:hover, .app-card:hover, .game-card:hover {
            box-shadow: 0 0 60px -15px var(--accent-teal);
            transform: scale(1.03) !important;
        }
        .brand-card:active, .app-card:active, .game-card:active {
            transform: scale(0.96) !important;
        }

        /* Section Headers */
        .section-header {
            position: relative;
            display: inline-block;
        }

        /* MacOS-style Navbar (Dark Frosted Glass) */
        .mac-nav {
            background: rgba(20, 24, 22, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Cinematic Fade-In Slide-Up for Hero Title */
        .hero-title {
            letter-spacing: -0.05em;
            color: #ffffff;
            opacity: 0;
            transform: translateY(80px);
            animation: fadeSlideUp 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Squircle Frames — circumscribed inner crop + white bg (except Asenturisk) */
        .squircle-frame {
            width: 118px;
            height: 118px;
            background: #ffffff;
            border-radius: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 30px -10px #8be8cb;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .squircle-frame:hover {
            transform: scale(1.12) rotate(2deg);
        }

        /* Virtual Guide */
        #guide-overlay {
            position: fixed; inset: 0; z-index: 9998;
            background: transparent; backdrop-filter: none;
            transition: background 0.5s, backdrop-filter 0.5s;
        }
        #guide-overlay.blur-active {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        #guide-overlay.hidden-layer { display: none; }
        
        #virtual-guide.pop-up {
            animation: bouncyPopUp 0.8s cubic-bezier(0.28, 0.84, 0.42, 1) forwards;
        }
        #virtual-guide.slide-down {
            transform: translateY(400px);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.55, 0.085, 0.68, 0.53);
        }

        @keyframes bouncyPopUp {
            0% { transform: translateY(400px) scale(0.5); opacity: 0; }
            60% { transform: translateY(-20px) scale(1.05); opacity: 1; }
            80% { transform: translateY(10px) scale(0.95); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .guide-bubble {
            background: #ffffff; color: #1f2421; padding: 14px 20px; border-radius: 24px;
            border-bottom-left-radius: 4px; font-weight: 600; font-size: 14px;
            max-width: 260px; margin-bottom: 12px; margin-left: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            opacity: 0; transform: scale(0.8) translateY(10px) origin-bottom-left; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .guide-bubble.show { opacity: 1; transform: scale(1) translateY(0); }
    </style>
</head>
